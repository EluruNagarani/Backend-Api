spring:
  application:
    name: sunday-discussions-api
  datasource:
    url: jdbc:h2:mem:policydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8080}

# Contract-first: the static OpenAPI YAML is the source of truth. Swagger UI is
# pointed at the committed spec rather than the code-generated /v3/api-docs
# (which stays enabled only so the Swagger UI controller is registered).
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi/policies-api.yaml
